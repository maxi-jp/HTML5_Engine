<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5_Engine Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1/themes/prism-okaidia.min.css">
  <style>
    :root { --theme-color: #61adff; }
    .markdown-section code { color: var(--theme-color); }
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4, .markdown-section strong { color: var(--theme-color); }
    .markdown-section p.tip, .markdown-section tr:nth-child(2n), thead { background-color: #282828;}
  </style>
</head>
<body>
  <div id="app">Loading&hellip;</div>
  <script>
    window.$docsify = {
      name: 'HTML5_Engine',
      nameLink: '/',
      repo: 'https://github.com/maxi-jp/HTML5_Engine',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        noData: 'No results found.',
        placeholder: 'Search docs...'
      },
      plugins: [
        function(hook) {
          var footer = [
            '<hr/>',
            '<p style="text-align:center;color:#999;font-size:.85em">',
            '&copy; 2026 HTML5_Engine &mdash; Licensed under ',
            '<a href="https://opensource.org/licenses/MIT" target="_blank">MIT License</a>',
            ' &mdash; Created by ',
            '<a href="https://github.com/maxi-jp" target="_blank">Maximiliano Miranda</a>',
            ' | <a href="https://www.linkedin.com/in/maximiliano-miranda/" target="_blank">LinkedIn</a>',
            ' | <a href="https://x.com/maxi_ke" target="_blank">X</a>',
            '</p>',
            '<p style="text-align:center;color:#666;font-size:.8em">',
            'Physics powered by <a href="https://github.com/hecht-software/box2dweb" target="_blank">box2dweb</a>',
            ' &mdash; Docs powered by <a href="https://docsify.js.org" target="_blank">Docsify</a>',
            '</p>'
          ].join('');
          hook.afterEach(function(html) { return html + footer; });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
</body>
</html>
